<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猪猪 & 猫猫的健康日记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-ivory: #f5f1ea;
            --bg-sand: #efe5da;
            --bg-blush: #f7ece6;
            --ink: #2f2925;
            --muted: #7c746d;
            --card: rgba(255, 252, 247, 0.78);
            --shadow: 0 24px 60px -32px rgba(79, 56, 35, 0.28);
            --gold: #c9a66b;
            --blue: #7fa7d8;
            --rose: #d9979f;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--ink);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0) 30%),
                radial-gradient(circle at 85% 15%, rgba(217, 151, 159, 0.18) 0%, rgba(217, 151, 159, 0) 28%),
                radial-gradient(circle at 20% 80%, rgba(127, 167, 216, 0.16) 0%, rgba(127, 167, 216, 0) 24%),
                linear-gradient(180deg, var(--bg-ivory) 0%, #f8f5f0 45%, var(--bg-blush) 100%);
            animation: backgroundBreath 16s ease-in-out infinite alternate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -10%;
            pointer-events: none;
            background:
                radial-gradient(circle at 18% 24%, rgba(255,255,255,0.34), transparent 22%),
                radial-gradient(circle at 80% 18%, rgba(217, 151, 159, 0.14), transparent 20%),
                radial-gradient(circle at 72% 72%, rgba(127, 167, 216, 0.12), transparent 20%);
            filter: blur(10px);
            animation: glowDrift 22s ease-in-out infinite alternate;
            z-index: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d8cdc0;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #bfaf9c;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 250, 244, 0.78);
            transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
        }

        .serif-display {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.02em;
        }

        .section-label {
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: #9a8876;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .hero-panel {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,248,240,0.65)),
                radial-gradient(circle at top right, rgba(201, 166, 107, 0.16), transparent 30%);
            border: 1px solid rgba(255,255,255,0.72);
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -10% -35% 40%;
            height: 260px;
            background: radial-gradient(circle, rgba(201, 166, 107, 0.14), rgba(201, 166, 107, 0));
            pointer-events: none;
        }

        .stat-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,250,245,0.72));
            border: 1px solid rgba(255,255,255,0.82);
        }

        .chart-shell {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,250,245,0.58)),
                radial-gradient(circle at top, rgba(201, 166, 107, 0.08), transparent 42%);
        }

        .note-wall {
            position: relative;
            min-height: 420px;
            padding: 0.5rem 0 1rem;
        }

        .chat-row {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            will-change: transform;
        }

        .note-bubble {
            position: absolute;
            width: max-content;
            max-width: min(100%, 360px);
            padding: 0.95rem 1rem 1rem;
            border-radius: 1.55rem;
            border: 1px solid rgba(255,255,255,0.76);
            box-shadow: 0 22px 44px -34px rgba(72, 52, 39, 0.38);
            transform-origin: center center;
            transform: rotate(var(--bubble-rotate, 0deg));
            transition: transform 240ms ease, box-shadow 240ms ease, border-color 240ms ease;
            animation: bubbleReveal 700ms cubic-bezier(.2,.8,.2,1) both;
        }

        .note-bubble.is-warm {
            border-bottom-left-radius: 0.5rem;
            background: linear-gradient(180deg, rgba(255,250,248,0.98), rgba(247, 232, 229, 0.9));
        }

        .note-bubble.is-cool {
            border-bottom-right-radius: 0.5rem;
            background: linear-gradient(180deg, rgba(250,252,255,0.98), rgba(232, 239, 247, 0.92));
        }

        .note-bubble.is-warm::after,
        .note-bubble.is-cool::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 18px;
            height: 18px;
            background: inherit;
        }

        .note-bubble.is-warm::after {
            left: -8px;
            clip-path: path("M18 0 C10 8, 4 13, 0 18 L18 18 Z");
        }

        .note-bubble.is-cool::after {
            right: -8px;
            clip-path: path("M0 0 C8 8, 14 13, 18 18 L0 18 Z");
        }

        .note-bubble:hover {
            transform: rotate(var(--bubble-rotate, 0deg)) translateY(-6px) scale(1.015) !important;
            box-shadow: 0 30px 56px -34px rgba(72, 52, 39, 0.45);
            border-color: rgba(201, 166, 107, 0.35);
        }

        .note-date {
            color: #8a7764;
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .note-text {
            color: #4c433d;
            line-height: 1.8;
        }

        .note-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.55rem;
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(22px);
            animation: revealUp 780ms cubic-bezier(.2,.8,.2,1) forwards;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 64px -36px rgba(79, 56, 35, 0.35);
            border-color: rgba(201, 166, 107, 0.28);
        }

        @keyframes revealUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bubbleReveal {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes backgroundBreath {
            0% {
                background-position: 0% 0%, 85% 15%, 20% 80%, 0% 0%;
            }
            100% {
                background-position: 4% 2%, 82% 18%, 24% 76%, 0% 0%;
            }
        }

        @keyframes glowDrift {
            0% {
                transform: translate3d(-1%, -1%, 0) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translate3d(1.5%, 1%, 0) scale(1.04);
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            .note-bubble {
                width: auto;
                max-width: calc(100% - 1rem);
            }
        }
    </style>
</head>

    <script>
        const dataElement = document.getElementById('weight-data');
        let rawData = [];

        try {
            rawData = JSON.parse(dataElement.textContent);
        } catch (e) {
            console.error('数据解析失败，请检查 JSON 格式是否正确。', e);
        }

        lucide.createIcons();

        const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('zh-CN', dateOptions);

        if (rawData.length > 0) {
            const latest = rawData[rawData.length - 1];
            const previous = rawData.length > 1 ? rawData[rawData.length - 2] : latest;

            document.getElementById('stat-days').textContent = rawData.length;
            document.getElementById('stat-piggy-weight').textContent = latest.piggy.toFixed(2);
            document.getElementById('stat-kitty-weight').textContent = latest.kitty.toFixed(2);

            function renderTrend(elementId, current, prev) {
                const el = document.getElementById(elementId);
                const diff = Number((current - prev).toFixed(2));

                if (diff < 0) {
                    el.className = 'mt-3 inline-flex items-center gap-1 px-3 py-1.5 rounded-2xl text-xs font-semibold bg-emerald-50 text-emerald-600 border border-emerald-100/70';
                    el.innerHTML = `<i data-lucide="trending-down" class="w-3.5 h-3.5"></i> 较上一条 ${Math.abs(diff).toFixed(2)} kg`;
                } else if (diff > 0) {
                    el.className = 'mt-3 inline-flex items-center gap-1 px-3 py-1.5 rounded-2xl text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-100/70';
                    el.innerHTML = `<i data-lucide="trending-up" class="w-3.5 h-3.5"></i> 较上一条 +${diff.toFixed(2)} kg`;
                } else {
                    el.className = 'mt-3 inline-flex items-center gap-1 px-3 py-1.5 rounded-2xl text-xs font-semibold bg-stone-100/70 text-stone-500 border border-stone-200/60';
                    el.innerHTML = '<i data-lucide="minus" class="w-3.5 h-3.5"></i> 保持平稳';
                }
            }

            renderTrend('stat-piggy-trend', latest.piggy, previous.piggy);
            renderTrend('stat-kitty-trend', latest.kitty, previous.kitty);

            const labels = rawData.map((item) => item.date.replace('-', '/'));
            const piggyData = rawData.map((item) => item.piggy);
            const kittyData = rawData.map((item) => item.kitty);
            const ctx = document.getElementById('weightChart').getContext('2d');

            const gradientPiggy = ctx.createLinearGradient(0, 0, 0, 380);
            gradientPiggy.addColorStop(0, 'rgba(127, 167, 216, 0.26)');
            gradientPiggy.addColorStop(1, 'rgba(127, 167, 216, 0)');

            const gradientKitty = ctx.createLinearGradient(0, 0, 0, 380);
            gradientKitty.addColorStop(0, 'rgba(217, 151, 159, 0.24)');
            gradientKitty.addColorStop(1, 'rgba(217, 151, 159, 0)');

            Chart.defaults.color = '#8c7f73';
            Chart.defaults.font.family = "'Noto Sans SC', sans-serif";

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '猪猪',
                            data: piggyData,
                            borderColor: '#7fa7d8',
                            backgroundColor: gradientPiggy,
                            borderWidth: 3,
                            pointBackgroundColor: '#fffdf9',
                            pointBorderColor: '#7fa7d8',
                            pointBorderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.42,
                            yAxisID: 'y'
                        },
                        {
                            label: '猫猫',
                            data: kittyData,
                            borderColor: '#d9979f',
                            backgroundColor: gradientKitty,
                            borderWidth: 3,
                            pointBackgroundColor: '#fffdf9',
                            pointBorderColor: '#d9979f',
                            pointBorderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.42,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    animation: {
                        duration: 1400,
                        easing: 'easeOutQuart'
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(255, 252, 247, 0.96)',
                            titleColor: '#43362c',
                            bodyColor: '#64584f',
                            borderColor: '#eadfce',
                            borderWidth: 1,
                            padding: 14,
                            boxPadding: 6,
                            usePointStyle: true,
                            titleFont: { size: 13, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                afterBody(context) {
                                    const note = rawData[context[0].dataIndex].note;
                                    return note ? `\n随记：${note}` : '';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { maxTicksLimit: 8, color: '#97887b' },
                            border: { display: false }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: { color: 'rgba(201, 177, 152, 0.22)', drawBorder: false, borderDash: [5, 6] },
                            border: { display: false },
                            suggestedMin: Math.floor(Math.min(...piggyData)) - 1,
                            suggestedMax: Math.ceil(Math.max(...piggyData)) + 1,
                            ticks: {
                                color: '#97887b',
                                callback: (value) => value + ' kg'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            grid: { display: false },
                            border: { display: false },
                            suggestedMin: Math.floor(Math.min(...kittyData)) - 1,
                            suggestedMax: Math.ceil(Math.max(...kittyData)) + 1,
                            ticks: {
                                color: '#97887b',
                                callback: (value) => value + ' kg'
                            }
                        }
                    }
                }
            });

            const noteWall = document.getElementById('dataTableBody');
            const notesOnly = [...rawData]
                .filter((row) => row.note && row.note.trim())
                .reverse();

            notesOnly.forEach((row, index) => {
                const rowEl = document.createElement('article');
                const bubble = document.createElement('div');
                const tone = index % 2 === 0 ? 'is-warm' : 'is-cool';
                const delay = (0.42 + index * 0.08).toFixed(2);
                const noteLength = row.note.trim().length;
                const width = Math.max(150, Math.min(340, 112 + noteLength * 8.2));

                rowEl.className = 'chat-row';
                rowEl.dataset.index = String(index);

                bubble.className = `note-bubble ${tone}`;
                bubble.style.maxWidth = `min(calc(100% - 1rem), ${width}px)`;
                bubble.style.animationDelay = `${delay}s`;
                bubble.dataset.index = String(index);
                bubble.dataset.length = String(noteLength);
                bubble.innerHTML = `
                    <div class="note-meta">
                        <span class="note-date">${row.date.replace('-', '/')}</span>
                        <span class="text-[11px] text-stone-400 tracking-[0.18em] uppercase">Note</span>
                    </div>
                    <p class="note-text text-sm">${row.note.trim()}</p>
                `;

                rowEl.appendChild(bubble);
                noteWall.appendChild(rowEl);
            });

            function createSeed(index) {
                return Math.abs(Math.sin((index + 1) * 19.19) * 10000) % 1;
            }

            let floatingStates = [];
            let floatingFrame = null;
            let lastFrameTime = 0;

            function layoutFloatingNotes() {
                const bubbles = Array.from(noteWall.querySelectorAll('.note-bubble'));
                if (!bubbles.length) return;

                const isMobile = window.innerWidth < 640;
                const rows = Array.from(noteWall.querySelectorAll('.chat-row'));
                const wallWidth = noteWall.clientWidth;
                const availableWidth = Math.max(220, wallWidth - (isMobile ? 12 : 24));
                const columnCount = isMobile ? 1 : Math.max(2, Math.min(5, Math.floor(availableWidth / 210)));
                const columnWidth = availableWidth / columnCount;
                const columnHeights = new Array(columnCount).fill(0);
                floatingStates = [];

                bubbles.forEach((bubble, index) => {
                    const row = rows[index];
                    const seedA = createSeed(index);
                    const seedB = createSeed(index + 7);
                    const seedC = createSeed(index + 13);
                    const seedD = createSeed(index + 23);
                    const seedE = createSeed(index + 31);
                    const noteLength = Number(bubble.dataset.length || 10);
                    const desiredWidth = isMobile
                        ? Math.min(availableWidth, Math.max(190, availableWidth - 8))
                        : Math.max(140, Math.min(280, 98 + noteLength * 6.6));

                    const maxBubbleWidth = isMobile
                        ? Math.min(desiredWidth, availableWidth)
                        : Math.min(desiredWidth, columnWidth - 8);

                    bubble.style.width = isMobile ? `${maxBubbleWidth}px` : 'max-content';
                    bubble.style.maxWidth = `${Math.max(140, maxBubbleWidth)}px`;
                    bubble.style.left = '0px';
                    bubble.style.top = '0px';

                    const bubbleWidth = bubble.offsetWidth;
                    const bubbleHeight = bubble.offsetHeight;
                    const targetColumn = isMobile
                        ? 0
                        : columnHeights.indexOf(Math.min(...columnHeights));
                    const columnLeft = targetColumn * columnWidth;
                    const innerOffset = isMobile
                        ? Math.max(0, (availableWidth - bubbleWidth) / 2)
                        : Math.max(
                            -18,
                            Math.min(
                                columnWidth - bubbleWidth + 18,
                                2 + seedA * Math.max(12, columnWidth - bubbleWidth + 10)
                            )
                        );
                    const crossShift = isMobile ? 0 : Math.round((seedD - 0.5) * 38);
                    const left = Math.max(0, Math.min(availableWidth - bubbleWidth, columnLeft + innerOffset + crossShift));
                    const topBase = columnHeights[targetColumn];
                    const top = isMobile
                        ? topBase
                        : Math.max(0, topBase - 10 + Math.round(seedC * 18));
                    const rotate = isMobile
                        ? 0
                        : (-2.8 + seedB * 5.6).toFixed(2);

                    bubble.style.left = `${left}px`;
                    bubble.style.top = `${Math.max(0, top)}px`;
                    bubble.style.setProperty('--bubble-rotate', `${rotate}deg`);

                    if (row) {
                        row.style.transform = 'translate3d(0, 0, 0)';
                    }

                    columnHeights[targetColumn] = top + bubbleHeight + (isMobile ? 22 : 10);
                    floatingStates.push({
                        row,
                        bubble,
                        baseX: 0,
                        baseY: 0,
                        x: 0,
                        y: 0,
                        vx: 0,
                        vy: 0,
                        width: bubbleWidth,
                        height: bubbleHeight,
                        ampX: isMobile ? 0 : 4 + seedB * 7,
                        ampY: isMobile ? 0 : 3 + seedC * 6,
                        phaseX: seedD * Math.PI * 2,
                        phaseY: seedE * Math.PI * 2,
                        speedX: 0.2 + seedA * 0.22,
                        speedY: 0.18 + seedB * 0.18,
                        maxShift: isMobile ? 0 : 12 + seedE * 10
                    });
                });

                noteWall.style.height = `${Math.max(Math.max(...columnHeights) + 20, 260)}px`;
                lastFrameTime = 0;
                if (floatingFrame) {
                    cancelAnimationFrame(floatingFrame);
                }
                floatingFrame = requestAnimationFrame(animateFloatingNotes);
            }

            function animateFloatingNotes(timestamp) {
                if (!floatingStates.length) return;

                if (!lastFrameTime) {
                    lastFrameTime = timestamp;
                }
                const dt = Math.min(32, timestamp - lastFrameTime) / 16.6667;
                lastFrameTime = timestamp;
                const wallWidth = noteWall.clientWidth;
                const wallHeight = noteWall.clientHeight;

                floatingStates.forEach((state) => {
                    if (!state.row) return;
                    const targetX = Math.sin(timestamp * 0.001 * state.speedX + state.phaseX) * state.ampX;
                    const targetY = Math.cos(timestamp * 0.001 * state.speedY + state.phaseY) * state.ampY;
                    state.vx += (targetX - state.x) * 0.012 * dt;
                    state.vy += (targetY - state.y) * 0.012 * dt;
                    state.vx *= 0.94;
                    state.vy *= 0.94;
                    state.x += state.vx;
                    state.y += state.vy;
                });

                for (let i = 0; i < floatingStates.length; i++) {
                    for (let j = i + 1; j < floatingStates.length; j++) {
                        const a = floatingStates[i];
                        const b = floatingStates[j];
                        if (!a.row || !b.row) continue;

                        const ax = a.bubble.offsetLeft + a.x;
                        const ay = a.bubble.offsetTop + a.y;
                        const bx = b.bubble.offsetLeft + b.x;
                        const by = b.bubble.offsetTop + b.y;
                        const overlapX = Math.min(ax + a.width, bx + b.width) - Math.max(ax, bx);
                        const overlapY = Math.min(ay + a.height, by + b.height) - Math.max(ay, by);

                        if (overlapX > 0 && overlapY > 0) {
                            const pushX = overlapX * 0.045 + 0.08;
                            const pushY = overlapY * 0.038 + 0.06;
                            const dirX = ax <= bx ? -1 : 1;
                            const dirY = ay <= by ? -1 : 1;
                            a.vx += dirX * pushX;
                            b.vx -= dirX * pushX;
                            a.vy += dirY * pushY;
                            b.vy -= dirY * pushY;
                        }
                    }
                }

                floatingStates.forEach((state) => {
                    if (!state.row) return;
                    const baseLeft = state.bubble.offsetLeft;
                    const baseTop = state.bubble.offsetTop;
                    const minX = -baseLeft;
                    const maxX = wallWidth - baseLeft - state.width;
                    const minY = -baseTop;
                    const maxY = wallHeight - baseTop - state.height;

                    state.x = Math.max(Math.min(state.x, Math.min(maxX, state.maxShift)), Math.max(minX, -state.maxShift));
                    state.y = Math.max(Math.min(state.y, Math.min(maxY, state.maxShift * 0.8)), Math.max(minY, -state.maxShift * 0.8));

                    state.row.style.transform = `translate3d(${state.x.toFixed(2)}px, ${state.y.toFixed(2)}px, 0)`;
                });

                floatingFrame = requestAnimationFrame(animateFloatingNotes);
            }

            requestAnimationFrame(layoutFloatingNotes);
            window.addEventListener('resize', layoutFloatingNotes);

            lucide.createIcons();
        }
    </script>
</body>
</html>
